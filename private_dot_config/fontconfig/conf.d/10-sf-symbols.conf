<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Prefer SF Pro for SF Symbols supplementary private use area (U+100000–U+10FFFF) -->
  <match>
    <test name="charset" compare="contains">
      <charset>
        <range>
          <int>0x100000</int>
          <int>0x10FFFF</int>
        </range>
      </charset>
    </test>
    <edit name="family" mode="prepend">
      <string>SF Pro</string>
    </edit>
  </match>
</fontconfig>
