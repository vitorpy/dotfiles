# Hyprlock configuration — Berg style
# Reference: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

$font = Avenir Next M for BBG

general {
    hide_cursor = false
}

auth {
    fingerprint {
        enabled = true
        ready_message = Touch sensor to unlock
        present_message = Scanning…
        retry_delay = 250
    }
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/vitorpy/.local/share/google-arts/current.webp
    blur_passes = 0
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0,0,0,0.6)

    outer_color = rgb(f49f31)   # active — Berg orange
    check_color = rgb(f49f31)  # success
    fail_color  = rgb(d54135)  # failure — Berg red

    font_color = rgb(acacae)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Enter password…
    fail_text = Authentication failed

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

# TIME (top-right)
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = rgb(acacae)

    position = -30, 0
    halign = right
    valign = top
}

# DATE (top-right, below time)
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font
    color = rgb(acacae)

    position = -30, -150
    halign = right
    valign = top
}

# Keyboard layout toggle (center-bottom)
label {
    monitor =
    text = $LAYOUT[EN,PL]
    font_size = 24
    font_family = $font
    color = rgb(acacae)
    background_color = rgba(0,0,0,0.6)
    onclick = hyprctl switchxkblayout all next

    position = 0, -100
    halign = center
    valign = center
}
