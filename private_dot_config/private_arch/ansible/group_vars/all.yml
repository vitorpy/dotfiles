---
arch_hostname: zygalski
arch_timezone: Europe/Warsaw
arch_locale: en_US.UTF-8
arch_console_keymap: us
arch_primary_user: vitorpy
arch_primary_user_shell: /usr/bin/zsh
arch_primary_user_home: "/home/{{ arch_primary_user }}"
arch_ly_service_name: ly@tty2.service

arch_system_services:
  - NetworkManager
  - sshd
  - nftables
  - apparmor
  - auditd

arch_desktop_enabled: false
arch_ly_enabled: false

arch_manage_user: true
arch_manage_sudoers: true

arch_security_enabled: true
arch_firewall_enabled: true
arch_firewall_allowed_tcp_ports:
  - 22
arch_firewall_allowed_udp_ports: []
arch_ssh_hardening_enabled: true
arch_ssh_password_auth_enabled: false
arch_ssh_kbd_interactive_enabled: false
arch_ssh_pubkey_auth_enabled: true
arch_ssh_root_login: "no"
arch_ssh_x11_forwarding_enabled: false
arch_ssh_allow_agent_forwarding_enabled: true
arch_ssh_allow_tcp_forwarding_enabled: true
arch_sysctl_hardening_enabled: true
arch_apparmor_enabled: true
arch_apparmor_boot_parameters: >-
  apparmor=1 security=apparmor lsm=landlock,lockdown,yama,integrity,apparmor,bpf
arch_lockdown_enabled: true
arch_lockdown_mode: confidentiality

arch_pacman_packages: []
arch_aur_packages: []
arch_package_prune_explicit: false
arch_package_prune_exclude: []

arch_boot_enabled: false
arch_kernel_pkg: linux
arch_root_mapper_name: cryptroot
arch_luks_uuid: ""
arch_kernel_cmdline: >-
  quiet loglevel=3 rd.systemd.show_status=auto rd.udev.log_level=3
  vt.global_cursor_default=0 video=2256x1504
arch_mkinitcpio_hooks: >-
  HOOKS=(base udev autodetect microcode modconf kms keyboard keymap
  consolefont block encrypt filesystems fsck)
arch_manage_secure_boot: false

arch_x11_keymap_layouts: "pl,us"
arch_x11_keymap_model: pc105
arch_x11_keymap_variant: ",intl"
arch_x11_keymap_options: grp:alt_shift_toggle

arch_pacman_packages_base:
  - ansible
  - starship
  - neovim
