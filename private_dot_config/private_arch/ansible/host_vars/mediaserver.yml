---
arch_hostname: mediaserver
arch_timezone: Europe/Warsaw

arch_host_pacman_packages_extra:
  - 7zip
  - calibre
  - tailscale
  - uv
  - vpl-gpu-rt
arch_host_aur_packages_extra:
  - bazarr
  - flaresolverr
  - hermes-agent
  - kcc
  - lidarr-bin
  - prowlarr
  - radarr
  - sonarr
arch_host_system_services_extra:
  - bazarr
  - flaresolverr
  - lidarr
  - prowlarr
  - radarr
  - sonarr
  - tailscaled
arch_host_firewall_allowed_tcp_ports_extra:
  - 7878
  - 8686
  - 8989
  - 9696
arch_host_firewall_allowed_udp_ports_extra:
  - 41641
arch_host_firewall_trusted_interfaces_extra:
  - tailscale0

arch_extra_mounts:
  - enabled: true
    src: "LABEL=MEDIA"
    path: /mnt/media
    fstype: ext4
    opts: defaults,nofail,x-systemd.device-timeout=10
    mode: "2775"

arch_transmission_download_dir: /mnt/media/downloads
arch_transmission_download_categories:
  - lidarr
  - radarr
  - tv-sonarr

arch_hermes_agent_enabled: true
arch_hermes_agent_provider: xai
arch_hermes_agent_base_url: https://api.x.ai/v1
arch_hermes_agent_model: grok-4.3
arch_hermes_agent_gateway_service_enabled: true

arch_flaresolverr_enabled: true

# Tenda CP3V2.2 — same endpoints as /mnt/media/cameras/tenda-cameras.m3u
# Re-discover by MAC OUI B8:3A:08 if DHCP moves them.
arch_frigate_cameras:
  - name: tenda_cp3_1
    host: 192.168.1.103
    rtsp_port: 8554
    user: admin
    password: admin123456
    main_path: /profile0
    sub_path: /profile1
    detect_width: 640
    detect_height: 360
    detect_fps: 5
  - name: tenda_cp3_2
    host: 192.168.1.104
    rtsp_port: 8554
    user: admin
    password: admin123456
    main_path: /profile0
    sub_path: /profile1
    detect_width: 640
    detect_height: 360
    detect_fps: 5
