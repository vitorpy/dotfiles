---
arch_hostname: scherbius
arch_timezone: Europe/Berlin
arch_console_keymap: de-latin1-nodeadkeys
arch_manage_grub_kernel_parameters: true

arch_host_pacman_packages_extra:
  - tailscale
arch_host_system_services_extra:
  - tailscaled
arch_host_firewall_allowed_udp_ports_extra:
  - 41641
arch_host_firewall_trusted_interfaces_extra:
  - tailscale0

arch_hosts_entries:
  - "127.0.0.1 localhost.localdomain localhost"
  - "65.109.48.183 scherbius.vitorpy.com scherbius"
  - "::1 ip6-localhost ip6-loopback"
  - "fe00::0 ip6-localnet"
  - "ff00::0 ip6-mcastprefix"
  - "ff02::1 ip6-allnodes"
  - "ff02::2 ip6-allrouters"
  - "ff02::3 ip6-allhosts"
  - "2a01:4f9:5a:2618::2 scherbius.vitorpy.com scherbius"

arch_host_firewall_allowed_tcp_ports_extra:
  - 4000
  - 8081

arch_nginx_managed_confs:
  - name: atproto-bot-webhook.conf
    src: nginx/atproto-bot-webhook.conf.j2
  - name: lob-web.conf
    src: nginx/lob-web.conf.j2
  - name: vitorpy.conf
    src: nginx/vitorpy.conf.j2
  - name: jellyfin.conf
    src: nginx/jellyfin.conf.j2
