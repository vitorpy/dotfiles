---
- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: "0755"
  when: arch_ssh_hardening_enabled | bool

- name: Install sshd hardening drop-in
  ansible.builtin.template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    mode: "0644"
    validate: /usr/bin/sshd -t -f %s
  when: arch_ssh_hardening_enabled | bool
  notify: Restart sshd

- name: Find systemd-boot entry files
  ansible.builtin.find:
    paths: /boot/loader/entries
    patterns: "*.conf"
    file_type: file
  register: security_boot_entry_files
  when:
    - arch_apparmor_enabled | bool or arch_lockdown_enabled | bool

- name: Check for GRUB defaults file
  ansible.builtin.stat:
    path: /etc/default/grub
  register: security_grub_defaults
  when:
    - arch_manage_grub_kernel_parameters | bool
    - arch_apparmor_enabled | bool or arch_lockdown_enabled | bool

- name: Enable AppArmor boot parameters in systemd-boot entries
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^(options\s+(?!.*\bapparmor=1\b).*)$'
    line: '\1 {{ arch_apparmor_boot_parameters }}'
    backrefs: true
  loop: "{{ security_boot_entry_files.files }}"
  when: arch_apparmor_enabled | bool

- name: Replace existing kernel lockdown mode in systemd-boot entries
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^(options\s+.*)\s+lockdown=\S+\s*$'
    line: '\1 lockdown={{ arch_lockdown_mode }}'
    backrefs: true
  loop: "{{ security_boot_entry_files.files }}"
  when: arch_lockdown_enabled | bool

- name: Enable kernel lockdown mode in systemd-boot entries
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^(options\s+(?!.*\blockdown=).*)$'
    line: '\1 lockdown={{ arch_lockdown_mode }}'
    backrefs: true
  loop: "{{ security_boot_entry_files.files }}"
  when: arch_lockdown_enabled | bool

- name: Enable AppArmor boot parameters in GRUB defaults
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?!.*\bapparmor=1\b)[^"]*)"$'
    line: '\1 {{ arch_apparmor_boot_parameters }}"'
    backrefs: true
  when:
    - arch_manage_grub_kernel_parameters | bool
    - arch_apparmor_enabled | bool
    - security_grub_defaults.stat.exists
  notify: Regenerate grub config

- name: Replace existing kernel lockdown mode in GRUB defaults
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT=".*)\s+lockdown=\S+([^"]*")$'
    line: '\1 lockdown={{ arch_lockdown_mode }}\2'
    backrefs: true
  when:
    - arch_manage_grub_kernel_parameters | bool
    - arch_lockdown_enabled | bool
    - security_grub_defaults.stat.exists
  notify: Regenerate grub config

- name: Enable kernel lockdown mode in GRUB defaults
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?!.*\blockdown=)[^"]*)"$'
    line: '\1 lockdown={{ arch_lockdown_mode }}"'
    backrefs: true
  when:
    - arch_manage_grub_kernel_parameters | bool
    - arch_lockdown_enabled | bool
    - security_grub_defaults.stat.exists
  notify: Regenerate grub config

- name: Install nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0644"
    validate: /usr/bin/nft -c -f %s
  when: arch_firewall_enabled | bool
  notify: Reload nftables

- name: Gather service facts for firewall migration
  ansible.builtin.service_facts:
  when: arch_firewall_disable_ufw | bool

- name: Disable legacy ufw firewall service
  ansible.builtin.systemd:
    name: ufw
    enabled: false
    state: stopped
  when:
    - arch_firewall_disable_ufw | bool
    - "'ufw.service' in ansible_facts.services"

- name: Install sysctl hardening drop-in
  ansible.builtin.template:
    src: 60-security-hardening.conf.j2
    dest: /etc/sysctl.d/60-security-hardening.conf
    mode: "0644"
  when: arch_sysctl_hardening_enabled | bool
  notify: Apply sysctl hardening
