---
# Frigate NVR via rootful Podman Quadlet (single-container exception)
- name: Ensure Podman is installed for Frigate
  ansible.builtin.package:
    name:
      - podman
      - crun
      - netavark
      - aardvark-dns
      - catatonit
      - fuse-overlayfs
    state: present
  tags:
    - frigate

- name: Ensure Frigate config directory exists
  ansible.builtin.file:
    path: "{{ arch_frigate_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  tags:
    - frigate

- name: Ensure Frigate media directory exists
  ansible.builtin.file:
    path: "{{ arch_frigate_media_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  tags:
    - frigate

- name: Ensure cameras parent directory exists
  ansible.builtin.file:
    path: "{{ arch_frigate_media_dir | dirname }}"
    state: directory
    owner: "{{ arch_primary_user }}"
    group: transmission
    mode: "2775"
  tags:
    - frigate

- name: Ensure Podman Quadlet system directory exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - frigate

- name: Install Frigate config
  ansible.builtin.template:
    src: frigate/config.yml.j2
    dest: "{{ arch_frigate_config_dir }}/config.yml"
    owner: root
    group: root
    mode: "0640"
  register: services_frigate_config
  tags:
    - frigate

- name: Install Frigate Podman Quadlet unit
  ansible.builtin.template:
    src: frigate/frigate.container.j2
    dest: /etc/containers/systemd/frigate.container
    owner: root
    group: root
    mode: "0644"
  register: services_frigate_quadlet
  tags:
    - frigate

- name: Enable Podman auto-update timer
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    enabled: true
    state: started
  when:
    - arch_frigate_podman_auto_update == 'registry'
    - not ansible_check_mode
  tags:
    - frigate

- name: Reload systemd after Quadlet changes
  ansible.builtin.systemd:
    daemon_reload: true
  when: services_frigate_quadlet.changed | default(false)
  tags:
    - frigate

- name: Enable and start Frigate container service
  ansible.builtin.systemd:
    name: frigate.service
    enabled: true
    state: started
  when: not ansible_check_mode
  tags:
    - frigate

- name: Restart Frigate when config changed
  ansible.builtin.systemd:
    name: frigate.service
    state: restarted
  when:
    - not ansible_check_mode
    - services_frigate_config.changed | default(false)
    - not (services_frigate_quadlet.changed | default(false))
  tags:
    - frigate
