---
- name: Ensure Transmission config directory exists
  ansible.builtin.file:
    path: /var/lib/transmission/.config/transmission-daemon
    state: directory
    owner: transmission
    group: transmission
    mode: "0755"
  when: arch_transmission_enabled | bool

- name: Ensure Transmission service override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/transmission.service.d
    state: directory
    mode: "0755"
  when: arch_transmission_enabled | bool

- name: Configure Transmission daemon for LAN web access
  ansible.builtin.template:
    src: transmission-override.conf.j2
    dest: /etc/systemd/system/transmission.service.d/10-mediaserver.conf
    mode: "0644"
  register: services_transmission_override
  when: arch_transmission_enabled | bool

- name: Install Transmission media sorter hook
  ansible.builtin.copy:
    src: media-sort-transmission
    dest: "{{ arch_media_sorter_path }}"
    owner: root
    group: root
    mode: "0755"
  when: arch_transmission_enabled | bool

- name: Ensure media sorter TMDB environment directory exists
  ansible.builtin.file:
    path: "{{ arch_media_sorter_tmdb_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: arch_transmission_enabled | bool

- name: Ensure media sorter environment file exists
  ansible.builtin.copy:
    dest: "{{ arch_media_sorter_tmdb_env_file }}"
    content: ""
    force: false
    owner: root
    group: root
    mode: "0600"
  when: arch_transmission_enabled | bool

- name: Configure media sorter AcoustID API key
  ansible.builtin.lineinfile:
    path: "{{ arch_media_sorter_tmdb_env_file }}"
    regexp: "^ACOUSTID_API_KEY="
    line: "ACOUSTID_API_KEY={{ arch_media_sorter_acoustid_api_key }}"
    create: true
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when:
    - arch_transmission_enabled | bool
    - arch_media_sorter_acoustid_api_key | default('') | length > 0

- name: Ensure media sorter queue directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2770"
  loop:
    - "{{ arch_media_sorter_queue_root }}"
    - "{{ arch_media_sorter_queue_root }}/queue"
    - "{{ arch_media_sorter_queue_root }}/done"
    - "{{ arch_media_sorter_queue_root }}/needs-review"
    - "{{ arch_media_sorter_queue_root }}/failed"
  when: arch_transmission_enabled | bool

- name: Allow primary user to read Transmission media sorter queue
  ansible.builtin.user:
    name: "{{ arch_primary_user }}"
    groups:
      - transmission
    append: true
  when:
    - arch_transmission_enabled | bool
    - arch_manage_user | bool

- name: Find media sorter queue records
  ansible.builtin.find:
    paths:
      - "{{ arch_media_sorter_queue_root }}/queue"
      - "{{ arch_media_sorter_queue_root }}/done"
      - "{{ arch_media_sorter_queue_root }}/needs-review"
      - "{{ arch_media_sorter_queue_root }}/failed"
    patterns: "*.json"
    file_type: file
  register: services_media_sorter_queue_records
  when: arch_transmission_enabled | bool

- name: Ensure media sorter queue records are group-readable
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    owner: transmission
    group: transmission
    mode: "0640"
  loop: "{{ services_media_sorter_queue_records.files | default([]) }}"
  when: arch_transmission_enabled | bool

- name: Install media sorter queue processor service
  ansible.builtin.template:
    src: media-sorter-process.service.j2
    dest: /etc/systemd/system/media-sorter-process.service
    mode: "0644"
  register: services_media_sorter_process_service
  when: arch_transmission_enabled | bool

- name: Install media sorter queue processor timer
  ansible.builtin.template:
    src: media-sorter-process.timer.j2
    dest: /etc/systemd/system/media-sorter-process.timer
    mode: "0644"
  register: services_media_sorter_process_timer
  when: arch_transmission_enabled | bool

- name: Check Transmission media sorter settings
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - >-
        import json;
        data = json.load(open("/var/lib/transmission/.config/transmission-daemon/settings.json"));
        print("ok" if data.get("script-torrent-done-enabled") is True
        and data.get("script-torrent-done-filename") == "{{ arch_media_sorter_path }}" else "changed")
  register: services_transmission_sorter_settings
  changed_when: false
  failed_when: false
  when: arch_transmission_enabled | bool

- name: Stop Transmission before changing daemon-owned settings
  ansible.builtin.systemd:
    name: transmission
    state: stopped
  when:
    - arch_transmission_enabled | bool
    - not ansible_check_mode
    - services_transmission_sorter_settings.stdout | default('changed') != 'ok'

- name: Enable Transmission done script setting
  ansible.builtin.lineinfile:
    path: /var/lib/transmission/.config/transmission-daemon/settings.json
    regexp: '^\s*"script-torrent-done-enabled"\s*:'
    line: '    "script-torrent-done-enabled": true,'
    validate: python3 -m json.tool %s
  register: services_transmission_sorter_enabled
  when: arch_transmission_enabled | bool

- name: Configure Transmission done script path
  ansible.builtin.lineinfile:
    path: /var/lib/transmission/.config/transmission-daemon/settings.json
    regexp: '^\s*"script-torrent-done-filename"\s*:'
    line: '    "script-torrent-done-filename": {{ arch_media_sorter_path | to_json }},'
    validate: python3 -m json.tool %s
  register: services_transmission_sorter_filename
  when: arch_transmission_enabled | bool

- name: Reload systemd after Transmission override changes
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - arch_transmission_enabled | bool
    - (services_transmission_override.changed | default(false)) or (services_media_sorter_process_service.changed | default(false)) or (services_media_sorter_process_timer.changed | default(false))

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Ensure extra mount points exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ arch_extra_mounts }}"
  when: item.enabled | default(true) | bool

- name: Configure extra mounts
  ansible.builtin.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: "{{ item.fstype }}"
    opts: "{{ item.opts | default('defaults,nofail') }}"
    state: "{{ item.state | default('mounted') }}"
  loop: "{{ arch_extra_mounts }}"
  when: item.enabled | default(true) | bool

- name: Allow Jellyfin to write shared media
  ansible.builtin.user:
    name: jellyfin
    groups:
      - render
      - transmission
      - video
    append: true
  register: services_jellyfin_media_group
  when: arch_transmission_enabled | bool

- name: Ensure media root is group writable
  ansible.builtin.file:
    path: "{{ arch_transmission_download_dir | dirname }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  when: arch_transmission_enabled | bool

- name: Ensure Transmission download directory exists
  ansible.builtin.file:
    path: "{{ arch_transmission_download_dir }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  register: services_transmission_download_dir
  when: arch_transmission_enabled | bool

- name: Ensure Jellyfin media library directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  loop:
    - "{{ arch_media_series_dir }}"
    - "{{ arch_media_films_dir }}"
    - "{{ arch_media_music_dir }}"
  when: arch_transmission_enabled | bool

- name: Find existing Jellyfin media library directories
  ansible.builtin.find:
    paths:
      - "{{ arch_media_series_dir }}"
      - "{{ arch_media_films_dir }}"
      - "{{ arch_media_music_dir }}"
    file_type: directory
    recurse: true
  register: services_jellyfin_media_directories
  when: arch_transmission_enabled | bool

- name: Ensure existing Jellyfin media directories are group writable
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  loop: "{{ services_jellyfin_media_directories.files | default([]) }}"
  when: arch_transmission_enabled | bool

- name: Enable and start core services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ (arch_system_services + arch_host_system_services_extra) | unique | difference(['nftables']) }}"
  when:
    - not ansible_check_mode or (item ~ '.service') in ansible_facts.services

- name: Ensure nginx conf.d directory exists
  ansible.builtin.file:
    path: "{{ arch_nginx_conf_dir }}"
    state: directory
    mode: "0755"
  when: arch_nginx_managed_confs | length > 0

- name: Install managed nginx virtual hosts
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ arch_nginx_conf_dir }}/{{ item.name }}"
    mode: "0644"
  loop: "{{ arch_nginx_managed_confs }}"
  register: services_nginx_managed_confs
  when: arch_nginx_managed_confs | length > 0

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  when:
    - services_nginx_managed_confs.changed | default(false)
    - not ansible_check_mode

- name: Reload nginx after managed configuration changes
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when:
    - services_nginx_managed_confs.changed | default(false)
    - not ansible_check_mode
    - "'nginx' in (arch_system_services + arch_host_system_services_extra)"

- name: Check Jellyfin encoding config
  ansible.builtin.stat:
    path: /etc/jellyfin/encoding.xml
  register: services_jellyfin_encoding_config
  when: "'jellyfin' in arch_system_services"

- name: Disable unsupported Jellyfin AV1 hardware encoding
  ansible.builtin.replace:
    path: /etc/jellyfin/encoding.xml
    regexp: '(<AllowAv1Encoding>)true(</AllowAv1Encoding>)'
    replace: '\1false\2'
  register: services_jellyfin_disable_av1_encoding
  when:
    - "'jellyfin' in arch_system_services"
    - services_jellyfin_encoding_config.stat.exists | default(false)

- name: Enable media sorter queue processor timer
  ansible.builtin.systemd:
    name: media-sorter-process.timer
    enabled: true
    state: started
  when:
    - arch_transmission_enabled | bool
    - arch_media_sorter_timer_enabled | bool
    - not ansible_check_mode or 'media-sorter-process.timer' in ansible_facts.services

- name: Restart Transmission after config changes
  ansible.builtin.systemd:
    name: transmission
    state: restarted
  when:
    - arch_transmission_enabled | bool
    - (services_transmission_override.changed | default(false)) or (services_transmission_download_dir.changed | default(false)) or (services_transmission_sorter_enabled.changed | default(false)) or (services_transmission_sorter_filename.changed | default(false))

- name: Restart Jellyfin after media config changes
  ansible.builtin.systemd:
    name: jellyfin
    state: restarted
  when:
    - "'jellyfin' in arch_system_services"
    - (services_jellyfin_media_group.changed | default(false)) or (services_jellyfin_disable_av1_encoding.changed | default(false))

- name: Enable nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
  when:
    - "'nftables' in arch_system_services"
    - not ansible_check_mode or 'nftables.service' in ansible_facts.services

- name: Load nftables ruleset
  ansible.builtin.systemd:
    name: nftables
    state: started
  changed_when: false
  when:
    - "'nftables' in arch_system_services"
    - not ansible_check_mode

- name: Enable mDNS host resolution
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: "^hosts:"
    line: "{{ arch_nsswitch_hosts_line }}"
  when: arch_mdns_enabled | bool

- name: Query CUPS printer options
  ansible.builtin.command:
    argv:
      - lpoptions
      - -p
      - "{{ item.name }}"
  loop: "{{ arch_printers }}"
  register: services_printer_options
  changed_when: false
  failed_when: false
  when: arch_printers | length > 0

- name: Configure CUPS printers
  ansible.builtin.command:
    argv:
      - lpadmin
      - -p
      - "{{ item.item.name }}"
      - -v
      - "{{ item.item.uri }}"
      - -m
      - "{{ item.item.model | default('everywhere') }}"
      - -E
  loop: "{{ services_printer_options.results | default([]) }}"
  when:
    - 'item.rc != 0 or item.stdout is not search("device-uri=" ~ (item.item.uri | regex_escape)) or item.stdout is not search("IPP Everywhere")'

- name: Query default CUPS printer
  ansible.builtin.command: lpstat -d
  register: services_default_printer
  changed_when: false
  failed_when: false
  when: 'arch_printers | selectattr("default", "defined") | selectattr("default") | list | length > 0'

- name: Set default CUPS printer
  ansible.builtin.command:
    argv:
      - lpadmin
      - -d
      - "{{ item.name }}"
  loop: "{{ arch_printers }}"
  when:
    - 'item.default | default(false) | bool'
    - 'services_default_printer.stdout != "system default destination: " ~ item.name'

- name: Disable getty on tty2 when using ly
  ansible.builtin.systemd:
    name: getty@tty2.service
    enabled: false
    state: stopped
  when: arch_ly_enabled | bool
