---
- name: Ensure Transmission config directory exists
  ansible.builtin.file:
    path: /var/lib/transmission/.config/transmission-daemon
    state: directory
    owner: transmission
    group: transmission
    mode: "0755"
  when: arch_transmission_enabled | bool

- name: Ensure Transmission service override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/transmission.service.d
    state: directory
    mode: "0755"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Configure Transmission daemon for LAN web access
  ansible.builtin.template:
    src: transmission-override.conf.j2
    dest: /etc/systemd/system/transmission.service.d/10-mediaserver.conf
    mode: "0644"
  register: services_transmission_override
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install Transmission media sorter library
  ansible.builtin.copy:
    src: media-sorter/
    dest: "{{ arch_media_sorter_lib_dir }}/"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Remove generated media sorter bytecode from installed library
  ansible.builtin.file:
    path: "{{ arch_media_sorter_lib_dir }}/media_sorter/__pycache__"
    state: absent
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install Transmission media sorter hook
  ansible.builtin.copy:
    src: >-
      {{
        lookup(
          'ansible.builtin.first_found',
          {
            'files': ['media-sort-transmission', 'executable_media-sort-transmission'],
            'paths': [role_path ~ '/files']
          }
        )
      }}
    dest: "{{ arch_media_sorter_path }}"
    owner: root
    group: root
    mode: "0755"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install media library removal tool
  ansible.builtin.copy:
    src: media-library-remove
    dest: "{{ arch_media_library_remove_path }}"
    owner: root
    group: root
    mode: "0755"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install media library audit tool
  ansible.builtin.copy:
    src: media-library-audit
    dest: "{{ arch_media_library_audit_path }}"
    owner: root
    group: root
    mode: "0755"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install Transmission tracker updater
  ansible.builtin.copy:
    src: transmission-update-trackers
    dest: "{{ arch_transmission_tracker_updater_path }}"
    owner: root
    group: root
    mode: "0755"
  when:
    - arch_transmission_enabled | bool
    - arch_transmission_tracker_updater_enabled | bool

- name: Ensure Transmission tracker updater state directory exists
  ansible.builtin.file:
    path: "{{ arch_transmission_tracker_updater_state_dir }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "0750"
  when:
    - arch_transmission_enabled | bool
    - arch_transmission_tracker_updater_enabled | bool

- name: Ensure media sorter TMDB environment directory exists
  ansible.builtin.file:
    path: "{{ arch_media_sorter_tmdb_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Ensure media sorter environment file exists
  ansible.builtin.copy:
    dest: "{{ arch_media_sorter_tmdb_env_file }}"
    content: ""
    force: false
    owner: root
    group: root
    mode: "0600"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Ensure media sorter Telegram environment file exists
  ansible.builtin.copy:
    dest: "{{ arch_media_sorter_telegram_env_file }}"
    content: |
      # MEDIA_SORTER_TELEGRAM_BOT_TOKEN=
      # MEDIA_SORTER_TELEGRAM_CHAT_ID=
    force: false
    owner: root
    group: transmission
    mode: "0640"
  no_log: true
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Ensure Jellyfin API environment file exists
  ansible.builtin.copy:
    dest: "{{ arch_media_sorter_tmdb_env_dir }}/jellyfin.env"
    content: |
      # JELLYFIN_API_KEY=
    force: false
    owner: root
    group: transmission
    mode: "0640"
  no_log: true
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Configure media sorter AcoustID API key
  ansible.builtin.lineinfile:
    path: "{{ arch_media_sorter_tmdb_env_file }}"
    regexp: "^ACOUSTID_API_KEY="
    line: "ACOUSTID_API_KEY={{ arch_media_sorter_acoustid_api_key }}"
    create: true
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when:
    - arch_transmission_enabled | bool
    - arch_media_sorter_acoustid_api_key | default('') | length > 0
  tags:
    - media_sorter

- name: Ensure media sorter queue directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2770"
  loop:
    - "{{ arch_media_sorter_queue_root }}"
    - "{{ arch_media_sorter_queue_root }}/queue"
    - "{{ arch_media_sorter_queue_root }}/done"
    - "{{ arch_media_sorter_queue_root }}/needs-review"
    - "{{ arch_media_sorter_queue_root }}/ignored"
    - "{{ arch_media_sorter_queue_root }}/failed"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Allow primary user to read Transmission media sorter queue
  ansible.builtin.user:
    name: "{{ arch_primary_user }}"
    groups:
      - transmission
    append: true
  when:
    - arch_transmission_enabled | bool
    - arch_manage_user | bool
  tags:
    - media_sorter

- name: Find media sorter queue records
  ansible.builtin.find:
    paths:
      - "{{ arch_media_sorter_queue_root }}/queue"
      - "{{ arch_media_sorter_queue_root }}/done"
      - "{{ arch_media_sorter_queue_root }}/needs-review"
      - "{{ arch_media_sorter_queue_root }}/ignored"
      - "{{ arch_media_sorter_queue_root }}/failed"
    patterns: "*.json"
    file_type: file
  register: services_media_sorter_queue_records
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Ensure media sorter queue records are group-readable
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: file
    owner: transmission
    group: transmission
    mode: "0640"
  loop: "{{ services_media_sorter_queue_records.files | default([]) }}"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install media sorter queue processor service
  ansible.builtin.template:
    src: media-sorter-process.service.j2
    dest: /etc/systemd/system/media-sorter-process.service
    mode: "0644"
  register: services_media_sorter_process_service
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install media sorter queue processor timer
  ansible.builtin.template:
    src: media-sorter-process.timer.j2
    dest: /etc/systemd/system/media-sorter-process.timer
    mode: "0644"
  register: services_media_sorter_process_timer
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install media library audit service
  ansible.builtin.template:
    src: media-library-audit.service.j2
    dest: /etc/systemd/system/media-library-audit.service
    mode: "0644"
  register: services_media_library_audit_service
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install media library audit timer
  ansible.builtin.template:
    src: media-library-audit.timer.j2
    dest: /etc/systemd/system/media-library-audit.timer
    mode: "0644"
  register: services_media_library_audit_timer
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Install Transmission tracker updater service
  ansible.builtin.template:
    src: transmission-trackers-update.service.j2
    dest: /etc/systemd/system/transmission-trackers-update.service
    mode: "0644"
  register: services_transmission_trackers_update_service
  when:
    - arch_transmission_enabled | bool
    - arch_transmission_tracker_updater_enabled | bool

- name: Install Transmission tracker updater timer
  ansible.builtin.template:
    src: transmission-trackers-update.timer.j2
    dest: /etc/systemd/system/transmission-trackers-update.timer
    mode: "0644"
  register: services_transmission_trackers_update_timer
  when:
    - arch_transmission_enabled | bool
    - arch_transmission_tracker_updater_enabled | bool

- name: Check Transmission managed settings
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - >-
        import json;
        data = json.load(open("/var/lib/transmission/.config/transmission-daemon/settings.json"));
        desired_sorter = {{ arch_media_sorter_enabled | bool | ternary('True', 'False') }};
        desired_umask = {{ ("%03o" | format(arch_transmission_umask | int)) | to_json }};
        sorter_ok = data.get("script-torrent-done-enabled") is desired_sorter;
        path_ok = (not desired_sorter) or data.get("script-torrent-done-filename") == {{ arch_media_sorter_path | to_json }};
        umask_ok = data.get("umask") in ({{ arch_transmission_umask | int }}, desired_umask);
        print("ok" if sorter_ok and path_ok and umask_ok else "changed")
  register: services_transmission_sorter_settings
  changed_when: false
  failed_when: false
  check_mode: false
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Stop Transmission before changing daemon-owned settings
  ansible.builtin.systemd:
    name: transmission
    state: stopped
  when:
    - arch_transmission_enabled | bool
    - not ansible_check_mode
    - services_transmission_sorter_settings.stdout | default('changed') != 'ok'
  tags:
    - media_sorter

- name: Configure Transmission group-writable umask
  ansible.builtin.lineinfile:
    path: /var/lib/transmission/.config/transmission-daemon/settings.json
    regexp: '^\s*"umask"\s*:'
    line: '    "umask": {{ ("%03o" | format(arch_transmission_umask | int)) | to_json }},'
    validate: python3 -m json.tool %s
  register: services_transmission_umask
  when:
    - arch_transmission_enabled | bool
    - services_transmission_sorter_settings.stdout | default('changed') != 'ok'
  tags:
    - media_sorter

- name: Configure Transmission done script enabled setting
  ansible.builtin.lineinfile:
    path: /var/lib/transmission/.config/transmission-daemon/settings.json
    regexp: '^\s*"script-torrent-done-enabled"\s*:'
    line: '    "script-torrent-done-enabled": {{ "true" if arch_media_sorter_enabled | bool else "false" }},'
    validate: python3 -m json.tool %s
  register: services_transmission_sorter_enabled
  when:
    - arch_transmission_enabled | bool
    - services_transmission_sorter_settings.stdout | default('changed') != 'ok'
  tags:
    - media_sorter

- name: Configure Transmission done script path
  ansible.builtin.lineinfile:
    path: /var/lib/transmission/.config/transmission-daemon/settings.json
    regexp: '^\s*"script-torrent-done-filename"\s*:'
    line: '    "script-torrent-done-filename": {{ arch_media_sorter_path | to_json }},'
    validate: python3 -m json.tool %s
  register: services_transmission_sorter_filename
  when:
    - arch_transmission_enabled | bool
    - arch_media_sorter_enabled | bool
    - services_transmission_sorter_settings.stdout | default('changed') != 'ok'
  tags:
    - media_sorter

- name: Reload systemd after Transmission override changes
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - arch_transmission_enabled | bool
    - (services_transmission_override.changed | default(false)) or (services_media_sorter_process_service.changed | default(false)) or (services_media_sorter_process_timer.changed | default(false)) or (services_media_library_audit_service.changed | default(false)) or (services_media_library_audit_timer.changed | default(false)) or (services_transmission_trackers_update_service.changed | default(false)) or (services_transmission_trackers_update_timer.changed | default(false))
  tags:
    - media_sorter

- name: Validate Hermes Agent configuration
  ansible.builtin.assert:
    that:
      - arch_hermes_agent_model | length > 0
      - arch_hermes_agent_base_url | length > 0
    fail_msg: "arch_hermes_agent_model and arch_hermes_agent_base_url are required when Hermes Agent is enabled."
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Ensure Hermes Agent config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0700"
  loop:
    - "{{ arch_hermes_agent_home }}"
    - "{{ arch_hermes_agent_home }}/cron"
    - "{{ arch_hermes_agent_home }}/sessions"
    - "{{ arch_hermes_agent_home }}/logs"
    - "{{ arch_hermes_agent_home }}/memories"
    - "{{ arch_hermes_agent_home }}/skills"
    - "{{ arch_hermes_agent_home }}/pairing"
    - "{{ arch_hermes_agent_home }}/hooks"
    - "{{ arch_hermes_agent_home }}/image_cache"
    - "{{ arch_hermes_agent_home }}/audio_cache"
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Install Hermes Agent config
  ansible.builtin.template:
    src: hermes-config.yaml.j2
    dest: "{{ arch_hermes_agent_home }}/config.yaml"
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0640"
  register: services_hermes_agent_config
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Ensure Hermes Agent environment file exists
  ansible.builtin.copy:
    dest: "{{ arch_hermes_agent_home }}/.env"
    content: |
      # Managed by Ansible. Model provider and Telegram defaults are configured in config.yaml.
      # Set XAI_API_KEY=<token> in this file on the host to enable the xAI/Grok provider.
      # Set TELEGRAM_BOT_TOKEN=<token> in this file on the host to enable the Telegram bridge.
      # BEGIN ANSIBLE MANAGED HERMES XAI PROVIDER
      # Optional xAI/Grok provider settings. Set real secrets outside this managed block.
      # XAI_API_KEY=
      # XAI_BASE_URL=
      # END ANSIBLE MANAGED HERMES XAI PROVIDER
      # BEGIN ANSIBLE MANAGED HERMES TELEGRAM BRIDGE
      # Optional Telegram bridge settings.
      # TELEGRAM_ALLOWED_USERS=
      # TELEGRAM_HOME_CHANNEL=
      # TELEGRAM_HOME_CHANNEL_NAME=
      # END ANSIBLE MANAGED HERMES TELEGRAM BRIDGE
    force: false
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0600"
  register: services_hermes_agent_env_file
  no_log: true
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Check Hermes Agent environment file
  ansible.builtin.stat:
    path: "{{ arch_hermes_agent_home }}/.env"
  register: services_hermes_agent_env
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Check Hermes Agent bundled skills
  ansible.builtin.stat:
    path: /opt/hermes-agent/skills
  register: services_hermes_agent_bundled_skills
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Install Hermes Agent bundled skills
  ansible.builtin.copy:
    src: /opt/hermes-agent/skills/
    dest: "{{ arch_hermes_agent_home }}/skills/"
    remote_src: true
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "u=rwX,go="
    directory_mode: "0700"
  when:
    - arch_hermes_agent_enabled | bool
    - services_hermes_agent_bundled_skills.stat.exists | default(false)
  tags:
    - hermes_agent

- name: Ensure Hermes Agent skills directory permissions
  ansible.builtin.file:
    path: "{{ arch_hermes_agent_home }}/skills"
    state: directory
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0700"
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Add Hermes Agent Telegram bridge environment hints
  ansible.builtin.blockinfile:
    path: "{{ arch_hermes_agent_home }}/.env"
    marker: "# {mark} ANSIBLE MANAGED HERMES TELEGRAM BRIDGE"
    block: |
      # Optional Telegram bridge settings.
      # TELEGRAM_ALLOWED_USERS=
      # TELEGRAM_HOME_CHANNEL=
      # TELEGRAM_HOME_CHANNEL_NAME=
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0600"
  register: services_hermes_agent_telegram_env_hints
  no_log: true
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_platform == 'telegram'
    - not ansible_check_mode or services_hermes_agent_env.stat.exists | default(false)
  tags:
    - hermes_agent

- name: Add Hermes Agent xAI provider environment hints
  ansible.builtin.blockinfile:
    path: "{{ arch_hermes_agent_home }}/.env"
    marker: "# {mark} ANSIBLE MANAGED HERMES XAI PROVIDER"
    block: |
      # Optional xAI/Grok provider settings. Set real secrets outside this managed block.
      # XAI_API_KEY=
      # XAI_BASE_URL=
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0600"
  register: services_hermes_agent_xai_env_hints
  no_log: true
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_provider == 'xai'
    - not ansible_check_mode or services_hermes_agent_env.stat.exists | default(false)
  tags:
    - hermes_agent

- name: Remove Hermes Agent WhatsApp bridge link
  ansible.builtin.file:
    path: "{{ arch_hermes_agent_home }}/whatsapp-bridge"
    state: absent
  when: arch_hermes_agent_enabled | bool
  tags:
    - hermes_agent

- name: Query Hermes Agent user id
  ansible.builtin.command:
    argv:
      - id
      - -u
      - "{{ arch_primary_user }}"
  register: services_hermes_agent_user_id
  changed_when: false
  check_mode: false
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
  tags:
    - hermes_agent

- name: Query Hermes Agent user linger state
  ansible.builtin.command:
    argv:
      - loginctl
      - show-user
      - "{{ arch_primary_user }}"
      - --property=Linger
      - --value
  register: services_hermes_agent_linger
  changed_when: false
  check_mode: false
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
  tags:
    - hermes_agent

- name: Enable linger for Hermes Agent gateway user
  ansible.builtin.command:
    argv:
      - loginctl
      - enable-linger
      - "{{ arch_primary_user }}"
  changed_when: true
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
    - services_hermes_agent_linger.stdout | default('no') != 'yes'
    - not ansible_check_mode
  tags:
    - hermes_agent

- name: Ensure Hermes Agent user systemd directory exists
  ansible.builtin.file:
    path: "{{ arch_primary_user_home }}/.config/systemd/user"
    state: directory
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0700"
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
  tags:
    - hermes_agent

- name: Install Hermes Agent gateway user service
  ansible.builtin.template:
    src: hermes-gateway.service.j2
    dest: "{{ arch_primary_user_home }}/.config/systemd/user/hermes-gateway.service"
    owner: "{{ arch_primary_user }}"
    group: "{{ arch_primary_user }}"
    mode: "0644"
  register: services_hermes_agent_gateway_service
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
  tags:
    - hermes_agent

- name: Reload Hermes Agent user systemd manager
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ arch_primary_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ services_hermes_agent_user_id.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ services_hermes_agent_user_id.stdout }}/bus"
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
    - services_hermes_agent_gateway_service.changed | default(false)
    - not ansible_check_mode
  tags:
    - hermes_agent

- name: Restart Hermes Agent gateway user service after unit or config changes
  ansible.builtin.systemd:
    name: hermes-gateway.service
    state: restarted
    scope: user
  become: true
  become_user: "{{ arch_primary_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ services_hermes_agent_user_id.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ services_hermes_agent_user_id.stdout }}/bus"
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
    - >-
      services_hermes_agent_gateway_service.changed | default(false)
      or services_hermes_agent_config.changed | default(false)
      or services_hermes_agent_env_file.changed | default(false)
      or services_hermes_agent_telegram_env_hints.changed | default(false)
      or services_hermes_agent_xai_env_hints.changed | default(false)
    - not ansible_check_mode
  tags:
    - hermes_agent

- name: Enable and start Hermes Agent gateway user service
  ansible.builtin.systemd:
    name: hermes-gateway.service
    enabled: true
    state: started
    scope: user
  become: true
  become_user: "{{ arch_primary_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ services_hermes_agent_user_id.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ services_hermes_agent_user_id.stdout }}/bus"
  when:
    - arch_hermes_agent_enabled | bool
    - arch_hermes_agent_gateway_service_enabled | bool
    - not ansible_check_mode
  tags:
    - hermes_agent

- name: Gather service facts
  ansible.builtin.service_facts:
  tags:
    - media_sorter

- name: Ensure extra mount points exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ arch_extra_mounts }}"
  when: item.enabled | default(true) | bool

- name: Configure extra mounts
  ansible.builtin.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: "{{ item.fstype }}"
    opts: "{{ item.opts | default('defaults,nofail') }}"
    state: "{{ item.state | default('mounted') }}"
  loop: "{{ arch_extra_mounts }}"
  when: item.enabled | default(true) | bool

- name: Check media service users
  ansible.builtin.command:
    argv:
      - id
      - -u
      - "{{ item }}"
  loop:
    - jellyfin
    - bazarr
    - sonarr
    - radarr
  register: services_media_user_query
  changed_when: false
  failed_when: false
  check_mode: false
  when: arch_transmission_enabled | bool

- name: Allow media services to write shared media
  ansible.builtin.user:
    name: "{{ item.item }}"
    groups: "{{ ['render', 'transmission', 'video'] if item.item == 'jellyfin' else ['transmission'] }}"
    append: true
  loop: "{{ services_media_user_query.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  register: services_media_group_users
  when:
    - arch_transmission_enabled | bool
    - item.rc == 0

- name: Ensure media root is group writable
  ansible.builtin.file:
    path: "{{ arch_transmission_download_dir | dirname }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  when: arch_transmission_enabled | bool

- name: Ensure Transmission download directory exists
  ansible.builtin.file:
    path: "{{ arch_transmission_download_dir }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  register: services_transmission_download_dir
  when: arch_transmission_enabled | bool

- name: Ensure Transmission category download directories exist
  ansible.builtin.file:
    path: "{{ arch_transmission_download_dir }}/{{ item }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  loop: "{{ arch_transmission_download_categories }}"
  when: arch_transmission_enabled | bool

- name: Ensure Jellyfin media library directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: transmission
    group: transmission
    mode: "2775"
  loop:
    - "{{ arch_media_series_dir }}"
    - "{{ arch_media_films_dir }}"
    - "{{ arch_media_music_dir }}"
  when: arch_transmission_enabled | bool

- name: Ensure existing Jellyfin media directories are group writable
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      changed=0
      check={{ ansible_check_mode | ternary('1', '0') }}

      for path in {{ arch_media_series_dir | quote }} {{ arch_media_films_dir | quote }} {{ arch_media_music_dir | quote }}; do
        [ -d "$path" ] || continue
        while IFS= read -r -d '' directory; do
          changed=1
          if [ "$check" -eq 0 ]; then
            chown transmission:transmission "$directory"
            chmod 2775 "$directory"
          fi
        done < <(find "$path" -type d \( ! -user transmission -o ! -group transmission -o ! -perm 2775 \) -print0)
      done

      if [ "$changed" -eq 1 ]; then
        echo changed
      else
        echo ok
      fi
    executable: /bin/bash
  register: services_jellyfin_media_directories
  changed_when: services_jellyfin_media_directories.stdout == "changed"
  check_mode: false
  when: arch_transmission_enabled | bool

- name: Ensure Jellyfin media directories inherit transmission group write ACLs
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      changed=0
      check={{ ansible_check_mode | ternary('1', '0') }}

      if ! command -v setfacl >/dev/null 2>&1 || ! command -v getfacl >/dev/null 2>&1; then
        echo ok
        exit 0
      fi

      for path in {{ arch_media_series_dir | quote }} {{ arch_media_films_dir | quote }} {{ arch_media_music_dir | quote }}; do
        [ -d "$path" ] || continue
        while IFS= read -r -d '' directory; do
          acl="$(getfacl -cp "$directory")"
          if ! grep -qx 'group:transmission:rwx' <<<"$acl" || ! grep -qx 'default:group:transmission:rwx' <<<"$acl"; then
            changed=1
            if [ "$check" -eq 0 ]; then
              setfacl -m g:transmission:rwx,d:g:transmission:rwx "$directory"
            fi
          fi
        done < <(find "$path" -type d -print0)
      done

      if [ "$changed" -eq 1 ]; then
        echo changed
      else
        echo ok
      fi
    executable: /bin/bash
  register: services_jellyfin_media_acls
  changed_when: services_jellyfin_media_acls.stdout == "changed"
  when: arch_transmission_enabled | bool
  tags:
    - media_sorter

- name: Enable and start core services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ (arch_system_services + arch_host_system_services_extra) | unique | difference(['nftables']) }}"
  when:
    - not ansible_check_mode or (item ~ '.service') in ansible_facts.services

- name: Restart media manager services after group changes
  ansible.builtin.systemd:
    name: "{{ item.item.item }}"
    state: restarted
  loop: "{{ services_media_group_users.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item }}"
  when:
    - item.changed | default(false)
    - item.item.item in ['bazarr', 'radarr', 'sonarr']
    - not ansible_check_mode
    - (item.item.item ~ '.service') in ansible_facts.services

- name: Ensure nginx conf.d directory exists
  ansible.builtin.file:
    path: "{{ arch_nginx_conf_dir }}"
    state: directory
    mode: "0755"
  when: arch_nginx_managed_confs | length > 0

- name: Install managed nginx virtual hosts
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ arch_nginx_conf_dir }}/{{ item.name }}"
    mode: "0644"
  loop: "{{ arch_nginx_managed_confs }}"
  register: services_nginx_managed_confs
  when: arch_nginx_managed_confs | length > 0

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  when:
    - services_nginx_managed_confs.changed | default(false)
    - not ansible_check_mode

- name: Reload nginx after managed configuration changes
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when:
    - services_nginx_managed_confs.changed | default(false)
    - not ansible_check_mode
    - "'nginx' in (arch_system_services + arch_host_system_services_extra)"

- name: Check Jellyfin encoding config
  ansible.builtin.stat:
    path: /etc/jellyfin/encoding.xml
  register: services_jellyfin_encoding_config
  when: "'jellyfin' in arch_system_services"

- name: Disable unsupported Jellyfin AV1 hardware encoding
  ansible.builtin.replace:
    path: /etc/jellyfin/encoding.xml
    regexp: '(<AllowAv1Encoding>)true(</AllowAv1Encoding>)'
    replace: '\1false\2'
  register: services_jellyfin_disable_av1_encoding
  when:
    - "'jellyfin' in arch_system_services"
    - services_jellyfin_encoding_config.stat.exists | default(false)

- name: Enable media sorter queue processor timer
  ansible.builtin.systemd:
    name: media-sorter-process.timer
    enabled: true
    state: started
  when:
    - arch_transmission_enabled | bool
    - arch_media_sorter_enabled | bool
    - arch_media_sorter_timer_enabled | bool
    - not ansible_check_mode or 'media-sorter-process.timer' in ansible_facts.services
  tags:
    - media_sorter

- name: Disable media sorter queue processor timer
  ansible.builtin.systemd:
    name: media-sorter-process.timer
    enabled: false
    state: stopped
  when:
    - arch_transmission_enabled | bool
    - (not arch_media_sorter_enabled | bool) or (not arch_media_sorter_timer_enabled | bool)
    - not ansible_check_mode or 'media-sorter-process.timer' in ansible_facts.services
  tags:
    - media_sorter

- name: Enable media library audit timer
  ansible.builtin.systemd:
    name: media-library-audit.timer
    enabled: true
    state: started
  when:
    - arch_transmission_enabled | bool
    - arch_media_library_audit_enabled | bool
    - not ansible_check_mode or 'media-library-audit.timer' in ansible_facts.services
  tags:
    - media_sorter

- name: Disable media library audit timer
  ansible.builtin.systemd:
    name: media-library-audit.timer
    enabled: false
    state: stopped
  when:
    - arch_transmission_enabled | bool
    - not (arch_media_library_audit_enabled | bool)
    - not ansible_check_mode or 'media-library-audit.timer' in ansible_facts.services
  tags:
    - media_sorter

- name: Enable Transmission tracker updater timer
  ansible.builtin.systemd:
    name: transmission-trackers-update.timer
    enabled: true
    state: started
  when:
    - arch_transmission_enabled | bool
    - arch_transmission_tracker_updater_enabled | bool
    - not ansible_check_mode or 'transmission-trackers-update.timer' in ansible_facts.services

- name: Restart Transmission after config changes
  ansible.builtin.systemd:
    name: transmission
    state: restarted
  when:
    - arch_transmission_enabled | bool
    - (services_transmission_override.changed | default(false)) or (services_transmission_download_dir.changed | default(false)) or (services_transmission_umask.changed | default(false)) or (services_transmission_sorter_enabled.changed | default(false)) or (services_transmission_sorter_filename.changed | default(false))
  tags:
    - media_sorter

- name: Restart Jellyfin after media config changes
  ansible.builtin.systemd:
    name: jellyfin
    state: restarted
  when:
    - "'jellyfin' in arch_system_services"
    - (services_media_group_users.changed | default(false)) or (services_jellyfin_disable_av1_encoding.changed | default(false))

- name: Enable nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
  when:
    - "'nftables' in arch_system_services"
    - not ansible_check_mode or 'nftables.service' in ansible_facts.services

- name: Load nftables ruleset
  ansible.builtin.systemd:
    name: nftables
    state: started
  changed_when: false
  when:
    - "'nftables' in arch_system_services"
    - not ansible_check_mode

- name: Enable mDNS host resolution
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: "^hosts:"
    line: "{{ arch_nsswitch_hosts_line }}"
  when: arch_mdns_enabled | bool

- name: Query CUPS printer options
  ansible.builtin.command:
    argv:
      - lpoptions
      - -p
      - "{{ item.name }}"
  loop: "{{ arch_printers }}"
  register: services_printer_options
  changed_when: false
  failed_when: false
  when: arch_printers | length > 0

- name: Configure CUPS printers
  ansible.builtin.command:
    argv:
      - lpadmin
      - -p
      - "{{ item.item.name }}"
      - -v
      - "{{ item.item.uri }}"
      - -m
      - "{{ item.item.model | default('everywhere') }}"
      - -E
  loop: "{{ services_printer_options.results | default([]) }}"
  when:
    - 'item.rc != 0 or item.stdout is not search("device-uri=" ~ (item.item.uri | regex_escape)) or item.stdout is not search("IPP Everywhere")'

- name: Query default CUPS printer
  ansible.builtin.command: lpstat -d
  register: services_default_printer
  changed_when: false
  failed_when: false
  when: 'arch_printers | selectattr("default", "defined") | selectattr("default") | list | length > 0'

- name: Set default CUPS printer
  ansible.builtin.command:
    argv:
      - lpadmin
      - -d
      - "{{ item.name }}"
  loop: "{{ arch_printers }}"
  when:
    - 'item.default | default(false) | bool'
    - 'services_default_printer.stdout != "system default destination: " ~ item.name'

- name: Disable getty on tty2 when using ly
  ansible.builtin.systemd:
    name: getty@tty2.service
    enabled: false
    state: stopped
  when: arch_ly_enabled | bool
