# Shell config sourced by the unattended mediaserver installer.

INSTALL_HOSTNAME="mediaserver"
INSTALL_TIMEZONE="Europe/Warsaw"
INSTALL_LOCALE="en_US.UTF-8"
INSTALL_KEYMAP="us"
INSTALL_USERNAME="vitorpy"
INSTALL_USER_SHELL="/usr/bin/zsh"

# Leave INSTALL_TARGET_DISK empty to select the first NVMe disk.
INSTALL_TARGET_DISK=""
INSTALL_TARGET_DISK_REGEX="^/dev/nvme[0-9]+n[0-9]+$"
INSTALL_EFI_SIZE="+512M"
INSTALL_ROOT_LABEL="root"
INSTALL_EFI_LABEL="EFI"

INSTALL_DOTFILES_REPO="https://github.com/vitorpy/dotfiles.git"
INSTALL_ANSIBLE_LIMIT="mediaserver"
INSTALL_FIRST_BOOT_ANSIBLE=true
INSTALL_FIRST_BOOT_LOG="/var/log/mediaserver-firstboot.log"

INSTALL_PACSTRAP_PACKAGES=(
  base
  linux
  linux-firmware
  intel-ucode
  networkmanager
  openssh
  sudo
  efibootmgr
  git
  zsh
  curl
  jq
  ansible
  chezmoi
  base-devel
)

