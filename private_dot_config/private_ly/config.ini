# Minimal Ly overrides on top of current upstream defaults.

# Do not allow blank-password logins.
allow_empty_password = false

# Keep the prompt static.
animation = none
animation_timeout_sec = 0

# Make failed logins less annoying to recover from.
clear_password = true

# Show a simple clock and hostname title.
clock = %a %b %d, %H:%M
box_title = zygalski

# Keep the main box transparent and preserve key hints.
blank_box = false
hide_key_hints = false

# Preserve the existing TTY font setup hook.
setup_cmd = /etc/ly/setup.sh
